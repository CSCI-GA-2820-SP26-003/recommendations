<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recommendation Service</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
    .card { border-radius: 0.75rem; }
    .card-header { border-radius: 0.75rem 0.75rem 0 0 !important; }
    #flash { display: none; }
    table th { white-space: nowrap; }
    .badge-type { font-size: 0.75rem; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand">🔗 Recommendation Service</span>
    <span class="navbar-text text-light small">
      API: <a href="/apidocs" target="_blank" class="text-warning">/apidocs</a>
    </span>
  </div>
</nav>

<div class="container">

  <!-- Flash message -->
  <div id="flash" class="alert alert-dismissible fade show" role="alert">
    <span id="flash-msg"></span>
    <button type="button" class="btn-close" onclick="hideFlash()"></button>
  </div>

  <div class="row g-4">

    <!-- ── CREATE FORM ──────────────────────────────────────────── -->
    <div class="col-lg-5">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <strong>Create Recommendation</strong>
        </div>
        <div class="card-body">
          <form id="create-form">
            <div class="mb-3">
              <label for="product_id" class="form-label">Product ID <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="product_id" placeholder="e.g. 101" required />
            </div>
            <div class="mb-3">
              <label for="recommended_product_id" class="form-label">Recommended Product ID <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="recommended_product_id" placeholder="e.g. 202" required />
            </div>
            <div class="mb-3">
              <label for="recommendation_type" class="form-label">Recommendation Type <span class="text-danger">*</span></label>
              <select class="form-select" id="recommendation_type" required>
                <option value="" disabled selected>Select a type…</option>
                <option value="cross_sell">cross_sell</option>
                <option value="up_sell">up_sell</option>
                <option value="accessory">accessory</option>
                <option value="similar_item">similar_item</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="score" class="form-label">Score <span class="text-muted">(optional, 0.0–1.0)</span></label>
              <input type="number" class="form-control" id="score" placeholder="e.g. 0.85" step="0.01" min="0" max="1" />
            </div>
            <button type="submit" class="btn btn-primary w-100">Create</button>
          </form>
        </div>
      </div>
    </div>

    <!-- ── SEARCH & LIST ──────────────────────────────────────────── -->
    <div class="col-lg-7">
      <div class="card shadow-sm">
        <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
          <strong>Recommendations</strong>
          <button class="btn btn-sm btn-light" onclick="loadAll()">Refresh</button>
        </div>
        <div class="card-body">

          <!-- Search filters -->
          <div class="row g-2 mb-3">
            <div class="col-4">
              <input type="number" class="form-control form-control-sm" id="filter_product_id" placeholder="product_id" />
            </div>
            <div class="col-4">
              <select class="form-select form-select-sm" id="filter_type">
                <option value="">All types</option>
                <option value="cross_sell">cross_sell</option>
                <option value="up_sell">up_sell</option>
                <option value="accessory">accessory</option>
                <option value="similar_item">similar_item</option>
              </select>
            </div>
            <div class="col-4">
              <button class="btn btn-sm btn-outline-secondary w-100" onclick="search()">Search</button>
            </div>
          </div>

          <!-- Results table -->
          <div class="table-responsive" style="max-height: 420px; overflow-y: auto;">
            <table class="table table-sm table-hover align-middle">
              <thead class="table-dark sticky-top">
                <tr>
                  <th>ID</th>
                  <th>Product</th>
                  <th>→ Recommended</th>
                  <th>Type</th>
                  <th>Score</th>
                  <th>❤️</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="results-body">
                <tr><td colspan="7" class="text-center text-muted">Click Refresh to load</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /row -->
</div><!-- /container -->

<script>
  const BASE_URL = "{{ base_url }}";

  // ── Utilities ──────────────────────────────────────────────────────
  function showFlash(msg, type = "success") {
    const el = document.getElementById("flash");
    el.className = `alert alert-${type} alert-dismissible fade show`;
    document.getElementById("flash-msg").textContent = msg;
    el.style.display = "block";
  }
  function hideFlash() {
    document.getElementById("flash").style.display = "none";
  }

  function typeBadge(t) {
    const colors = {
      cross_sell: "primary", up_sell: "success",
      accessory: "warning", similar_item: "info"
    };
    return `<span class="badge bg-${colors[t] || "secondary"} badge-type">${t}</span>`;
  }

  // ── Render rows ───────────────────────────────────────────────────
  function renderRows(data) {
    const tbody = document.getElementById("results-body");
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No recommendations found</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr id="row-${r.id}">
        <td>${r.id}</td>
        <td>${r.product_id}</td>
        <td>${r.recommended_product_id}</td>
        <td>${typeBadge(r.recommendation_type)}</td>
        <td>${r.score !== null ? r.score.toFixed(2) : "—"}</td>
        <td>
          <button class="btn btn-sm btn-outline-danger" onclick="like(${r.id})">
            ❤️ ${r.like_count}
          </button>
        </td>
        <td>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteRec(${r.id})">🗑</button>
        </td>
      </tr>
    `).join("");
  }

  // ── Load all ──────────────────────────────────────────────────────
  async function loadAll() {
    hideFlash();
    try {
      const res = await fetch(BASE_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      renderRows(await res.json());
    } catch (err) {
      showFlash("Failed to load recommendations: " + err.message, "danger");
    }
  }

  // ── Search ────────────────────────────────────────────────────────
  async function search() {
    hideFlash();
    const pid = document.getElementById("filter_product_id").value.trim();
    const type = document.getElementById("filter_type").value;
    const params = new URLSearchParams();
    if (pid)  params.append("product_id", pid);
    if (type) params.append("recommendation_type", type);
    try {
      const res = await fetch(`${BASE_URL}?${params}`);
      if (!res.ok) {
        const body = await res.json();
        throw new Error(body.message || `HTTP ${res.status}`);
      }
      renderRows(await res.json());
    } catch (err) {
      showFlash("Search failed: " + err.message, "danger");
    }
  }

  // ── Create ────────────────────────────────────────────────────────
  document.getElementById("create-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    hideFlash();
    const scoreVal = document.getElementById("score").value.trim();
    const payload = {
      product_id: parseInt(document.getElementById("product_id").value),
      recommended_product_id: parseInt(document.getElementById("recommended_product_id").value),
      recommendation_type: document.getElementById("recommendation_type").value,
    };
    if (scoreVal !== "") payload.score = parseFloat(scoreVal);

    try {
      const res = await fetch(BASE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const body = await res.json();
        throw new Error(body.message || `HTTP ${res.status}`);
      }
      const created = await res.json();
      showFlash(`Recommendation #${created.id} created successfully!`, "success");
      document.getElementById("create-form").reset();
      loadAll();
    } catch (err) {
      showFlash("Create failed: " + err.message, "danger");
    }
  });

  // ── Like ──────────────────────────────────────────────────────────
  async function like(id) {
    try {
      const res = await fetch(`${BASE_URL}/${id}/like`, { method: "PUT" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      // Update the like button in-place
      const row = document.getElementById(`row-${id}`);
      if (row) {
        row.querySelector("button[onclick^='like']").innerHTML = `❤️ ${data.like_count}`;
      }
    } catch (err) {
      showFlash("Like failed: " + err.message, "danger");
    }
  }

  // ── Delete ────────────────────────────────────────────────────────
  async function deleteRec(id) {
    if (!confirm(`Delete recommendation #${id}?`)) return;
    try {
      const res = await fetch(`${BASE_URL}/${id}`, { method: "DELETE" });
      if (res.status !== 204) throw new Error(`HTTP ${res.status}`);
      showFlash(`Recommendation #${id} deleted.`, "warning");
      document.getElementById(`row-${id}`)?.remove();
    } catch (err) {
      showFlash("Delete failed: " + err.message, "danger");
    }
  }

  // Auto-load on page open
  loadAll();
</script>

</body>
</html>
